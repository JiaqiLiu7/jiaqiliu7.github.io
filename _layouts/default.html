---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">

<head>
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

  {% include browser-upgrade.html %}
  {% include masthead.html %}

  <div id="main" role="main">
    {% include sidebar.html %}

    <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
      {% if page.title %}
      <meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{%
      endif %}
      <div class="page__inner-wrap">
        <section class="page__content" itemprop="text">
          {{ content }}
        </section>
      </div>
    </article>
  </div>

  <div id="clustrmap-container" style="display: none; width: 100%; margin-top: 2em; padding-bottom: 2em;">
    <div id="clustrmap-inner" style="text-align: center; margin: 0 auto; max-width: 400px;">
    </div>
  </div>

  {% include scripts.html %}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var toggleBtn = document.getElementById("toggle-clustrmap");
      var mapContainer = document.getElementById("clustrmap-container");
      var mapInner = document.getElementById("clustrmap-inner");
      var isMapLoaded = false; // 增加一个标记，记录地图是否已经加载

      if (toggleBtn && mapContainer && mapInner) {
        toggleBtn.addEventListener("click", function (e) {
          e.preventDefault();

          // 切换显示状态
          if (mapContainer.style.display === "none") {
            mapContainer.style.display = "block";

            // 关键修复：当容器显示出来后，如果是第一次点击，动态加载真实的地图脚本
            if (!isMapLoaded) {
              var script = document.createElement("script");
              script.type = "text/javascript";
              script.id = "clstr_globe";
              // 强制使用 https 保证安全加载
              script.src = "https://clustrmaps.com/globe.js?d=xFUpag_K0X4IRHg6kx2CiRRVEJUNUqxwNZ3ecYkelrw";

              mapInner.appendChild(script); // 把脚本塞进容器
              isMapLoaded = true; // 标记为已加载，下次点击不再重复塞入
            }

          } else {
            mapContainer.style.display = "none";
          }
        });
      }
    });
  </script>

</body>

</html>

---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">

<head>
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

  {% include browser-upgrade.html %}
  {% include masthead.html %}

  <div id="main" role="main">
    {% include sidebar.html %}

    <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
      {% if page.title %}
      <meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{%
      endif %}
      <div class="page__inner-wrap">
        <section class="page__content" itemprop="text">
          {{ content }}
        </section>
      </div>
    </article>
  </div>

  <div id="clustrmap-container"
    style="position: absolute; top: -9999px; left: -9999px; visibility: hidden; width: 100%;">
    <div style="text-align: center; margin: 0 auto; max-width: 200px;">
      <script type="text/javascript" id="clstr_globe"
        src="https://clustrmaps.com/globe.js?d=xFUpag_K0X4IRHg6kx2CiRRVEJUNUqxwNZ3ecYkelrw"></script>
    </div>
  </div>

  {% include scripts.html %}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var toggleBtn = document.getElementById("toggle-clustrmap");
      var mapContainer = document.getElementById("clustrmap-container");

      if (toggleBtn && mapContainer) {
        toggleBtn.addEventListener("click", function (e) {
          e.preventDefault();

          if (mapContainer.style.position === "absolute") {
            // 1. 显示地图：恢复相对定位，取消 top 和 left 的流放
            mapContainer.style.position = "relative";
            mapContainer.style.top = "auto";
            mapContainer.style.left = "auto";
            mapContainer.style.visibility = "visible";

            // 【距离微调】这里改成了 0.5em，地球会明显往上靠
            mapContainer.style.marginTop = "0.5em";
            mapContainer.style.paddingBottom = "2em";

            // 图标变彩色
            toggleBtn.style.filter = "grayscale(0%)";

          } else {
            // 2. 隐藏地图：同时向左和向上流放，彻底消除页面底部的幽灵空白
            mapContainer.style.position = "absolute";
            mapContainer.style.top = "-9999px";
            mapContainer.style.left = "-9999px";
            mapContainer.style.visibility = "hidden";

            mapContainer.style.marginTop = "0";
            mapContainer.style.paddingBottom = "0";

            // 图标变灰
            toggleBtn.style.filter = "grayscale(100%)";
          }
        });
      }
    });
  </script>
</body>

</html>

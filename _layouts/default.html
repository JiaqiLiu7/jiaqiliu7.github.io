---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">

<head>
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

  {% include browser-upgrade.html %}
  {% include masthead.html %}

  <div id="main" role="main">
    {% include sidebar.html %}

    <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
      {% if page.title %}
      <meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{%
      endif %}
      <div class="page__inner-wrap">
        <section class="page__content" itemprop="text">
          {{ content }}
        </section>
      </div>
    </article>
  </div>

  <div id="clustrmap-container"
    style="display: none; text-align: center; margin: 30px auto; padding-bottom: 20px; width: 100%; max-width: 800px;">
    <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

    <script type="text/javascript" id="clustrmaps"
      src="//clustrmaps.com/map_v2.js?d=xFUpag_K0X4IRHg6kx2CiRRVEJUNUqxwNZ3ecYkelrw"></script>

  </div>

  {% include scripts.html %}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var toggleBtn = document.getElementById("toggle-clustrmap");
      var mapContainer = document.getElementById("clustrmap-container");

      if (toggleBtn && mapContainer) {
        toggleBtn.addEventListener("click", function (e) {
          e.preventDefault(); // 再次确保不会触发默认的跳转行为

          // 切换显示状态
          if (mapContainer.style.display === "none") {
            mapContainer.style.display = "block";
            // 可选：如果你希望点开地图后，让地球图标恢复彩色，可以取消下面这行的注释
            toggleBtn.style.filter = "grayscale(0%)";
          } else {
            mapContainer.style.display = "none";
            // 可选：隐藏地图后，让地球图标重新变灰
            toggleBtn.style.filter = "grayscale(100%)";
          }
        });
      }
    });
  </script>

</body>

</html>
